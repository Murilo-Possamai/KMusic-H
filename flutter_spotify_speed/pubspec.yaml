name: spotify_speed
description: App que toca playlists do Spotify baseado na velocidade do celular
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Spotify Auth & API
  flutter_web_auth_2: ^4.0.0
  http: ^1.2.1

  # Sensores e GPS
  sensors_plus: ^5.0.1
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Estado e armazenamento
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Utilidades
  url_launcher: ^6.3.0
  crypto: ^3.0.3
  convert: ^3.1.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
